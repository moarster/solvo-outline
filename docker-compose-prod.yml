services:

  outline:
    image: dockerreg.solvo.ru/solvo/reg/solvo-outline:latest
    ports:
      - mode: host
        target: 3000
        published: 3000
        protocol: tcp
    environment:
      - TZ=Europe/Moscow
        # db settings
      - DATABASE_URL=postgres://outline_user:outline@postgres:5432/outline_db?sslmode=disable&connect_timeout=10
      - DATABASE_CONNECTION_POOL_MAX=5
      - PGSSLMODE=disable
      - REDIS_URL=redis://redis:6379
        # minio settings
      - FILE_STORAGE=s3
      - FILE_STORAGE_UPLOAD_MAX_SIZE=262144000
      - FILE_STORAGE_IMPORT_MAX_SIZE=262144000
      - FILE_STORAGE_WORKSPACE_IMPORT_MAX_SIZE=262144000000
      - AWS_ACCESS_KEY_ID=uFippVu6lwwaQXylIEFc
      - AWS_S3_ACCELERATE_URL=http://s3.solvo.ru/outline
      - AWS_S3_ACL=private
      - AWS_S3_FORCE_PATH_STYLE=false
      - AWS_S3_UPLOAD_BUCKET_NAME=outline
      - AWS_S3_UPLOAD_BUCKET_URL=http://s3.solvo.ru/outline
      - AWS_SECRET_ACCESS_KEY=mNp1r4GdIR6SY1Xm3q5l0qLwMgXug4bm459pdSsV
      - AWS_REGION=eu-east-1
        # identity
      - OIDC_CLIENT_ID=outline
      - OIDC_CLIENT_SECRET=iymZgQB0yTvGcG9pD6MiOXp40DUVgSHL
      - OIDC_AUTH_URI=https://keycloak.solvo.ru/realms/solvo/protocol/openid-connect/auth
      - OIDC_TOKEN_URI=https://keycloak.solvo.ru/realms/solvo/protocol/openid-connect/token
      - OIDC_USERINFO_URI=https://keycloak.solvo.ru/realms/solvo/protocol/openid-connect/userinfo
      - OIDC_LOGOUT_URI=https://keycloak.solvo.ru/realms/solvo/protocol/openid-connect/logout
      - OIDC_USERNAME_CLAIM=email
      - OIDC_DISPLAY_NAME=Keycloak
      - OIDC_SCOPES=openid profile email
      - OIDC_DISABLE_REDIRECT=false
        # ssl settings
      - FORCE_HTTPS=false
        # app settings
      - ENABLE_UPDATES=false
      - WEB_CONCURRENCY=4
      - DEBUG=http
      - LOG_LEVEL=silly
      - RATE_LIMITER_ENABLED=true
      - RATE_LIMITER_REQUESTS=1000
      - RATE_LIMITER_DURATION_WINDOW=60
      - KROKI_SERVER_URL=http://outline.solvo.ru:8000
      - FILE_STORAGE_LOCAL_ROOT_DIR=/var/lib/outline/data
      - DEVELOPMENT_UNSAFE_INLINE_CSP=true
      - NODE_ENV=production
      - SECRET_KEY=00703eaa1fedbb92d903c439feac11e4268c76f6eecc097ba6cc714431b5cb08
      - UTILS_SECRET=7eee2571836979d3724f9900a55b1291aa3cdfbc32c42056aacfaaa5b9978649
      - URL=https://outline.solvo.ru
      - PORT=3000
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    networks:
      - redis-net
      - solvo_db_net
      - outline-net
    volumes:
      - outline_data:/var/lib/outline/data
    deploy:
      placement:
        constraints:
          - "node.labels.TAG==manager"

volumes:
  outline_data:

networks:
  outline-net:
    attachable: true
    name: outline-net
  redis-net:
    external: true
  solvo_db_net:
    external: true
